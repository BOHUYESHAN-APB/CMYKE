<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f6f2ea;
      font-family: sans-serif;
    }
    #c {
      width: 100%;
      height: 100%;
      display: block;
    }
    #status {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(255, 255, 255, 0.82);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      color: #1f2228;
      max-width: 240px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      line-height: 1.4;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="status">Booting viewer...</div>
  <script>
    const statusEl = document.getElementById('status');
    window.__setStatus = (msg) => {
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      statusEl.style.opacity = '1';
    };
    window.__setStatus('Booting viewer...');

    const __params = new URLSearchParams(window.location.search);
    const __transparent = __params.get('transparent') === '1';
    const __petStartup = __params.get('pet') === '1';
    const __quality = (__params.get('quality') || 'balanced').toLowerCase();
    if (__transparent || __petStartup) {
      document.documentElement.style.background = 'transparent';
      document.body.style.background = 'transparent';
    }
    window.__pendingVrmUrl = null;
    window.loadVrmFromUrl = (url) => {
      window.__pendingVrmUrl = url;
      window.__setStatus('Viewer not ready yet, queued VRM url.');
    };
    window.__controlMode = 'basic';
    window.setControlMode = (mode) => {
      const m = 'basic';
      window.__controlMode = m;
      window.__setStatus(`Mode: ${m}`);
    };
    window.applyPose = (_pose) => {
      window.__setStatus('applyPose called before viewer ready');
    };
    window.__autoDrive = true;
    window.setAutoDrive = (flag) => {
      window.__autoDrive = !!flag;
    };
    window.__stabilityMode = true;
    window.setStabilityMode = (flag) => {
      window.__stabilityMode = !!flag;
    };
    window.__idleAnimationEnabled = true;
    window.setIdleAnimationEnabled = (flag) => {
      window.__idleAnimationEnabled = !!flag;
    };
    // Procedural idle overlays can fight authored VRMA clips (double transforms),
    // causing twitch/lean especially in legs/hips. Keep it OFF by default; it will
    // still be used as a fallback when VRMA idle is unavailable.
    window.__proceduralIdleEnabled = false;
    window.setProceduralIdleEnabled = (flag) => {
      window.__proceduralIdleEnabled = !!flag;
    };
    window.__talking = false;
    window.setTalking = (flag) => {
      window.__talking = !!flag;
    };
    window.__cursorFollow = false;
    window.__cursorNdc = null;
    window.setCursorFollow = (flag) => {
      window.__cursorFollow = !!flag;
    };
    window.__petMode = false;
    window.setPetMode = (flag) => {
      window.__petMode = !!flag;
    };
    if (__petStartup) {
      window.__petMode = true;
    }
    window.__petZoom = 1.0;
    window.setPetZoom = (zoom) => {
      const v = Number(zoom);
      if (!Number.isFinite(v)) return;
      window.__petZoom = Math.max(0.6, Math.min(2.2, v));
    };
    window.__renderQuality = __quality;
    const __fpsRaw = Number(__params.get('fps') || '0');
    window.__fpsCap = Number.isFinite(__fpsRaw) ? Math.max(0, Math.round(__fpsRaw)) : 0;
    window.setFpsCap = (cap) => {
      const n = Number(cap);
      window.__fpsCap = Number.isFinite(n) ? Math.max(0, Math.round(n)) : 0;
    };
    window.setRenderQuality = (quality) => {
      const q = String(quality || '').toLowerCase();
      window.__renderQuality = q || 'balanced';
      if (typeof window.__applyRenderQuality === 'function') {
        window.__applyRenderQuality(window.__renderQuality);
      }
    };
    window.setCursorNdc = (x, y) => {
      const nx = Number(x);
      const ny = Number(y);
      if (!Number.isFinite(nx) || !Number.isFinite(ny)) return;
      window.__cursorNdc = {
        x: Math.min(1, Math.max(0, nx)),
        y: Math.min(1, Math.max(0, ny)),
      };
    };
    const canvasEl = document.getElementById('c');
    if (canvasEl) {
      let dragging = false;
      canvasEl.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        dragging = true;
        try {
          window.triggerPetDrag && window.triggerPetDrag();
        } catch (_) {}
      });
      window.addEventListener('mouseup', () => {
        dragging = false;
      });
      canvasEl.addEventListener('mousemove', (e) => {
        const rect = canvasEl.getBoundingClientRect();
        const w = Math.max(1, rect.width);
        const h = Math.max(1, rect.height);
        const nx = (e.clientX - rect.left) / w;
        const ny = (e.clientY - rect.top) / h;
        window.setCursorNdc(nx, ny);
        if (dragging) {
          try {
            window.triggerPetDrag && window.triggerPetDrag();
          } catch (_) {}
        }
      });
      canvasEl.addEventListener('mouseleave', () => {
        dragging = false;
        window.__cursorNdc = null;
      });
    }
    window.addEventListener('error', (e) => {
      const detail = e?.message || 'Unknown error';
      window.__setStatus(`JS error: ${detail}`);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const detail = e?.reason?.message || e?.reason || 'Unknown rejection';
      window.__setStatus(`Promise error: ${detail}`);
    });
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "/assets/vrm_core/three.module.js",
        "three/addons/": "/assets/vrm_core/jsm/",
        "@pixiv/three-vrm": "/assets/vrm_core/three-vrm.module.js",
        "@pixiv/three-vrm-animation": "/assets/vrm_core/three-vrm-animation.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import {
      VRMAnimationLoaderPlugin,
      VRMLookAtQuaternionProxy,
      createVRMAnimationClip,
    } from '@pixiv/three-vrm-animation';
    // Helper math utils adapted from Studying/airi-main pose-to-vrm
    const vec = (x = 0, y = 0, z = 0) => ({ x, y, z });
    const vAdd = (a, b) => vec(a.x + b.x, a.y + b.y, (a.z ?? 0) + (b.z ?? 0));
    const vSub = (a, b) => vec(a.x - b.x, a.y - b.y, (a.z ?? 0) - (b.z ?? 0));
    const vScale = (v, s) => vec(v.x * s, v.y * s, (v.z ?? 0) * s);
    const vLen = (v) => Math.hypot(v.x, v.y, v.z ?? 0);
    const vNorm = (v) => {
      const l = vLen(v);
      if (!Number.isFinite(l) || l <= 1e-6) return null;
      return vScale(v, 1 / l);
    };
    const vDot = (a, b) => a.x * b.x + a.y * b.y + (a.z ?? 0) * (b.z ?? 0);
    const vRemapAxis = (v, axis) => vec(v.x * axis.x, v.y * axis.y, (v.z ?? 0) * axis.z);
    const vNeg = (v) => vec(-v.x, -v.y, -(v.z ?? 0));
    const vCross = (a, b) => {
      const az = a.z ?? 0;
      const bz = b.z ?? 0;
      return vec(a.y * bz - az * b.y, az * b.x - a.x * bz, a.x * b.y - a.y * b.x);
    };
    const mid = (a, b) => vScale(vAdd(a, b), 0.5);
    const safePole = (dir, pole, threshold = 0.85) => {
      const d = Math.abs(vDot(dir, pole));
      if (!Number.isFinite(d)) return null;
      return d > threshold ? null : pole;
    };
    const makeBasis = (xVec, yVec, zVec) => {
      const m = new THREE.Matrix4();
      m.makeBasis(xVec, yVec, zVec);
      return m;
    };
    const DEFAULT_AXIS = { x: 1, y: 1, z: 1 };
    const DEFAULT_MIN_VISIBILITY = 0.5;
    const DEFAULT_MIN_PRESENCE = 0;

    // Bone chain definitions (simplified from Studying/airi apply-pose-to-vrm)
    const CHAINS = {
      hips: { bone: 'hips', childCandidates: ['spine'] },
      spine: { bone: 'spine', childCandidates: ['chest', 'upperChest', 'neck'] },
      chest: { bone: 'chest', childCandidates: ['upperChest', 'neck'] },
      leftShoulder: { bone: 'leftShoulder', childCandidates: ['leftUpperArm'] },
      rightShoulder: { bone: 'rightShoulder', childCandidates: ['rightUpperArm'] },
      leftUpperArm: { bone: 'leftUpperArm', childCandidates: ['leftLowerArm'] },
      leftLowerArm: { bone: 'leftLowerArm', childCandidates: ['leftHand'] },
      rightUpperArm: { bone: 'rightUpperArm', childCandidates: ['rightLowerArm'] },
      rightLowerArm: { bone: 'rightLowerArm', childCandidates: ['rightHand'] },
      leftUpperLeg: { bone: 'leftUpperLeg', childCandidates: ['leftLowerLeg'] },
      leftLowerLeg: { bone: 'leftLowerLeg', childCandidates: ['leftFoot'] },
      rightUpperLeg: { bone: 'rightUpperLeg', childCandidates: ['rightLowerLeg'] },
      rightLowerLeg: { bone: 'rightLowerLeg', childCandidates: ['rightFoot'] },
    };
    const LIMB_POLE_KEYS = new Set(['leftUpperArm', 'rightUpperArm', 'leftUpperLeg', 'rightUpperLeg']);

    const post = (type, msg) => {
      try {
        window.chrome?.webview?.postMessage(JSON.stringify({ type, msg }));
      } catch (_) {}
    };
    window.triggerPetDrag = () => {
      if (window.__petMode !== true) return;
      post('pet', 'drag');
    };
    const setStatus = window.__setStatus || ((msg) => {
      const el = document.getElementById('status');
      if (el) el.textContent = msg;
      post('status', msg);
    });
    window.onerror = (msg, src, line, col, err) => {
      const detail = `${msg} @ ${src ?? 'unknown'}:${line ?? '?'}:${col ?? '?'}`;
      setStatus(`JS error: ${detail}`);
      post('error', detail);
    };

    function bootstrap() {
      post('info', 'bootstrap:start');
      setStatus('Modules ready. Initializing scene...');

      const canvas = document.getElementById('c');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      const QUALITY_PRESETS = {
        low: { maxRatio: 1.0, pixelBudget: 900000, optimizeTextures: true },
        balanced: { maxRatio: 1.25, pixelBudget: 1200000, optimizeTextures: true },
        high: { maxRatio: 1.6, pixelBudget: 1800000, optimizeTextures: false },
      };
      let quality = QUALITY_PRESETS[window.__renderQuality] || QUALITY_PRESETS.balanced;
      function applyRenderScale() {
        const w = Math.max(1, canvas.clientWidth);
        const h = Math.max(1, canvas.clientHeight);
        const dpr = Math.min(window.devicePixelRatio || 1, quality.maxRatio);
        const budgetRatio = Math.sqrt(quality.pixelBudget / Math.max(1, w * h));
        const ratio = Math.max(0.5, Math.min(dpr, budgetRatio));
        renderer.setPixelRatio(ratio);
      }
      applyRenderScale();
      if (__transparent || __petStartup) {
        renderer.setClearColor(0x000000, 0);
      }

      const scene = new THREE.Scene();
      if (!(__transparent || __petStartup)) {
        scene.background = new THREE.Color(0xf6f2ea);
      }

      const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
      // Align with AIRI: camera is in front of a -Z-facing model (negative Z).
      camera.position.set(0, 1.4, -1.5);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1.3, 0);
      controls.enablePan = !(__petStartup);
      controls.enableZoom = !(__petStartup);
      controls.update();

      // Lighting: key + fill + rim + ambient for softer look.
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
      keyLight.position.set(1.5, 1.8, 1.2);
      keyLight.castShadow = false;
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
      fillLight.position.set(-1.2, 1.0, 0.8);
      scene.add(fillLight);

      const rimLight = new THREE.DirectionalLight(0xffffff, 0.6);
      rimLight.position.set(0.0, 1.0, -1.2);
      scene.add(rimLight);

      const ambient = new THREE.AmbientLight(0xffffff, 0.35);
      scene.add(ambient);

      // Ground helper (subtle grid).
      if (!(__petStartup || __transparent)) {
        const grid = new THREE.GridHelper(4, 8, 0x999999, 0xdddddd);
        grid.position.y = -0.05;
        grid.material.opacity = 0.25;
        grid.material.transparent = true;
        scene.add(grid);
      }

      const axes = new THREE.AxesHelper(0.4);
      axes.visible = false; // hide by default
      scene.add(axes);

      const loader = new GLTFLoader();
      loader.crossOrigin = 'anonymous';
      loader.register((parser) => new VRMLoaderPlugin(parser));
      loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

      function optimizeTextures(root) {
        if (!quality.optimizeTextures || !root) return;
        root.traverse((obj) => {
          const mats = obj?.material;
          if (!mats) return;
          const list = Array.isArray(mats) ? mats : [mats];
          list.forEach((mat) => {
            if (!mat || typeof mat !== 'object') return;
            Object.values(mat).forEach((value) => {
              if (value && value.isTexture) {
                value.generateMipmaps = false;
                value.minFilter = THREE.LinearFilter;
                value.magFilter = THREE.LinearFilter;
                value.anisotropy = 0;
                value.needsUpdate = true;
              }
            });
          });
        });
      }
      window.__applyRenderQuality = (name) => {
        quality = QUALITY_PRESETS[name] || QUALITY_PRESETS.balanced;
        applyRenderScale();
        if (currentVrm?.scene) {
          optimizeTextures(currentVrm.scene);
        }
      };

      let currentVrm = null;
      let motionMode = null;
      let motionStart = 0;
      const motionDuration = 3.0; // seconds before auto reset
      const clock = new THREE.Clock();
      const idleAnimationUrl = '/assets/vrm_core/animations/idle_loop.vrma';
      let vrmMixer = null;
      let idleAction = null;
      let activeVrmaMotionAction = null;
      let vrmaMotionPlaying = false;
      let vrmaMotionRestoreTimer = null;
      const vrmaMotionActionCache = new Map();
      let availableVrmaAnimations = [];
      // Optional catalog describing each VRMA clip (id/name/type/auto flags).
      // When provided, we only auto-play "talk" gestures during speaking.
      let vrmaCatalog = [];
      let vrmaById = new Map();
      let vrmaByName = new Map();
      let autoMotionWhitelist = null;
      let nextPetDragAt = 0;
      const framing = {
        ready: false,
        baseDistance: 1.6,
        center: new THREE.Vector3(),
        size: new THREE.Vector3(),
      };
      let lastAppliedPetZoom = null;

      function applyPetZoom(force = false) {
        if (window.__petMode !== true) return;
        if (!framing.ready) return;
        const raw = Number(window.__petZoom ?? 1.0);
        const zoom = Number.isFinite(raw) ? THREE.MathUtils.clamp(raw, 0.6, 2.2) : 1.0;
        if (!force && lastAppliedPetZoom === zoom) return;
        lastAppliedPetZoom = zoom;
        const distance = framing.baseDistance / zoom;
        camera.position.set(
          framing.center.x,
          framing.center.y + framing.size.y * 0.1,
          framing.center.z - distance,
        );
        controls.target.copy(framing.center);
        controls.minDistance = (framing.baseDistance * 0.6) / zoom;
        controls.maxDistance = (framing.baseDistance * 2.2) / zoom;
        controls.update();
      }
      const normalizeMotionKey = (motion) => {
        const raw = String(motion ?? '').trim();
        return raw ? raw.toLowerCase() : '';
      };
      const isAutoMotionAllowed = (motion) => {
        if (!autoMotionWhitelist || autoMotionWhitelist.size === 0) return true;
        const key = normalizeMotionKey(motion);
        if (!key) return false;
        if (autoMotionWhitelist.has(key)) return true;
        const base = key.split('/').pop();
        return !!base && autoMotionWhitelist.has(base);
      };
      function setAutoMotionWhitelist(list) {
        if (!Array.isArray(list) || list.length === 0) {
          autoMotionWhitelist = null;
          post('info', 'auto motion whitelist: off');
          return;
        }
        const set = new Set();
        list.forEach((item) => {
          const key = normalizeMotionKey(item);
          if (key) set.add(key);
        });
        autoMotionWhitelist = set.size ? set : null;
        post(
          'info',
          `auto motion whitelist: ${autoMotionWhitelist ? autoMotionWhitelist.size : 0}`,
        );
      }

      function resolvePetDragMotionKey() {
        const preferred = ['mme_pet_misc_pet_dragging', 'pet_dragging', 'hover_reaction'];
        for (const id of preferred) {
          if (vrmaById.has(String(id).toLowerCase())) return id;
        }
        const match = vrmaCatalog.find((m) => {
          const id = (m?.id ?? '').toString();
          const name = (m?.name ?? '').toString();
          const url = (m?.url ?? '').toString();
          const hay = `${id} ${name} ${url}`.toLowerCase();
          return hay.includes('pet_drag') || hay.includes('drag');
        });
        if (match) {
          const id = (match.id ?? '').toString().trim();
          if (id) return id;
          const url = (match.url ?? '').toString().trim();
          if (url) return url;
        }
        return 'mme_pet_misc_pet_dragging';
      }

      function triggerPetDrag() {
        if (window.__petMode !== true) return;
        if (!currentVrm) return;
        const now = clock.getElapsedTime();
        if (now < nextPetDragAt) return;
        nextPetDragAt = now + THREE.MathUtils.randFloat(1.2, 2.4);

        // If we have explicit talk VRMAs, avoid interrupting them while speaking.
        if (window.__talking === true && vrmaCatalog.some((m) => m?.auto?.talk === true)) {
          return;
        }

        const key = resolvePetDragMotionKey();
        if (!key) return;
        tryPlayVrmaMotion(key).then((played) => {
          if (played) {
            post('info', `motion(vrma): ${key}`);
          }
        });
      }
      const lookAtTarget = new THREE.Object3D();
      const lookAtBase = new THREE.Vector3(0, 1.3, 1.5);
      const tmpEyePos = new THREE.Vector3();
      const modelCenter = new THREE.Vector3(0, 1, 0);
      const tmpVec = new THREE.Vector3();
      const tmpVec2 = new THREE.Vector3();
      const tmpHipPos = new THREE.Vector3();
      const tmpQuat = new THREE.Quaternion();
      const tmpQuat2 = new THREE.Quaternion();
      const tmpQuat3 = new THREE.Quaternion();
      const tmpEuler = new THREE.Euler();
      const worldUp = new THREE.Vector3(0, 1, 0);
      const modelForward = new THREE.Vector3(0, 0, -1);
      let blinkController = null;
      let eyeSaccadeController = null;
      let emoteController = null;
      let baseHipY = null;
      let hipLockUntil = 0;
      const autoDrive = {
        nextBlink: 0,
        blinkDur: 0.12,
        nextGazeShift: 0,
        gazeTarget: new THREE.Vector2(0, 0),
        breathPhase: 0,
        idlePhase: 0,
        swayPhase: 0,
        nextMicroGesture: 0,
        micro: null,
        nextIdleExpression: 0,
        nextIdleAction: 0,
        nextGesture: 0,
        gesture: null,
      };
      // Procedural one-shot actions (small, clamped overlays) that have explicit names.
      // These are not random; they are only triggered by the app (StageMotion / commands).
      const procedural = {
        nod: { active: false, start: 0, duration: 0.9, strength: 0.14 },
        look: { until: 0, dx: 0, dy: 0 },
      };
      const idlePose = {
        head: { x: 0, y: 0, z: 0 },
        headTarget: { x: 0, y: 0, z: 0 },
        headTimer: 0,
        headInterval: 1.4,
        leftArm: { x: 0, z: 0 },
        rightArm: { x: 0, z: 0 },
        armTarget: { leftX: 0, leftZ: 0, rightX: 0, rightZ: 0 },
        armTimer: 0,
        armInterval: 1.8,
      };
      // Talking overlay (ported from Studying/ai_virtual_mate_web-main)
      const talkOverlay = {
        headTimer: 0,
        headInterval: 0.55,
        headTarget: { x: 0, y: 0, z: 0 },
        head: { x: 0, y: 0, z: 0 },
        armTimer: 0,
        armInterval: 0.7,
        armTarget: {
          leftX: 0,
          leftZ: 0,
          rightX: 0,
          rightZ: 0,
        },
        arm: {
          leftX: 0,
          leftZ: 0,
          rightX: 0,
          rightZ: 0,
        },
        torso: { x: 0, y: 0, z: 0, tx: 0, ty: 0, tz: 0 },
        shoulder: { lz: 0, rz: 0, tlz: 0, trz: 0 },
      };
      const POSE_BASE = {
        headX: 0.1,
        armZ: Math.PI / 2.3,
      };
      let stableIdleLogged = false;
      const poseRestDir = {};
      const poseRestPole = {};
      const restQuaternions = {};
      const baseQuaternions = {};
      const lastTargetDir = {};
      const lastTargetPole = {};
      setStatus('Scene ready. Waiting for VRM...');

      function hideStatusSoon(delayMs = 1200) {
        const el = document.getElementById('status');
        if (!el) return;
        window.setTimeout(() => {
          el.style.transition = 'opacity 240ms ease';
          el.style.opacity = '0';
          window.setTimeout(() => {
            el.style.display = 'none';
          }, 260);
        }, delayMs);
      }

      const FINGER_BONES = (() => {
        const result = [];
        const sides = ['left', 'right'];
        const fingers = ['Thumb', 'Index', 'Middle', 'Ring', 'Little'];
        const segments = ['Proximal', 'Intermediate', 'Distal'];
        for (const side of sides) {
          for (const finger of fingers) {
            for (const seg of segments) {
              result.push(`${side}${finger}${seg}`);
            }
          }
        }
        return result;
      })();

      const bones = {};
      function cacheBones() {
        if (!currentVrm?.humanoid) return;
        const names = [
          'head',
          'neck',
          'upperChest',
          'chest',
          'spine',
          'hips',
          'leftShoulder',
          'rightShoulder',
          'leftUpperArm',
          'leftLowerArm',
          'rightUpperArm',
          'rightLowerArm',
          'leftHand',
          'rightHand',
          'leftUpperLeg',
          'leftLowerLeg',
          'leftFoot',
          'rightUpperLeg',
          'rightLowerLeg',
          'rightFoot',
          ...FINGER_BONES,
        ];
        names.forEach((n) => {
          bones[n] = currentVrm.humanoid.getNormalizedBoneNode(n);
        });
      }

      function captureRestRotations() {
        const names = [
          'head',
          'neck',
          'upperChest',
          'chest',
          'spine',
          'hips',
          'leftShoulder',
          'rightShoulder',
          'leftUpperArm',
          'leftLowerArm',
          'leftHand',
          'rightUpperArm',
          'rightLowerArm',
          'rightHand',
          'leftUpperLeg',
          'leftLowerLeg',
          'leftFoot',
          'rightUpperLeg',
          'rightLowerLeg',
          'rightFoot',
          ...FINGER_BONES,
        ];
        names.forEach((n) => {
          const bone = bones[n];
          if (bone) {
            let rest = restQuaternions[n];
            if (!rest) {
              rest = new THREE.Quaternion();
              restQuaternions[n] = rest;
            }
            rest.copy(bone.quaternion);
          }
        });
      }

      function captureBasePose() {
        Object.keys(baseQuaternions).forEach((k) => delete baseQuaternions[k]);
        Object.entries(bones).forEach(([name, bone]) => {
          if (!bone) return;
          const q = new THREE.Quaternion();
          q.copy(bone.quaternion);
          baseQuaternions[name] = q;
        });
      }

      function resetToBasePose() {
        Object.entries(baseQuaternions).forEach(([name, q]) => {
          const bone = bones[name];
          if (!bone || !q) return;
          bone.quaternion.copy(q);
        });
      }

      function applyRestRotation(name, offset) {
        const bone = bones[name];
        if (!bone) return;
        let rest = restQuaternions[name];
        if (!rest) {
          rest = new THREE.Quaternion();
          rest.copy(bone.quaternion);
          restQuaternions[name] = rest;
        }
        bone.quaternion.copy(rest);
        if (offset) {
          tmpEuler.set(
            offset?.x ?? 0,
            offset?.y ?? 0,
            offset?.z ?? 0,
            bone.rotation.order,
          );
          tmpQuat2.setFromEuler(tmpEuler);
          bone.quaternion.multiply(tmpQuat2);
        }
      }

      function clampRotation(name, limits) {
        const bone = bones[name];
        const rest = restQuaternions[name];
        if (!bone || !rest || !limits) return;
        const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
        tmpQuat2.copy(rest).invert();
        tmpQuat3.copy(tmpQuat2).multiply(bone.quaternion);
        tmpEuler.setFromQuaternion(tmpQuat3, bone.rotation.order);
        const nx = limits.x ? clamp(tmpEuler.x, limits.x[0], limits.x[1]) : tmpEuler.x;
        const ny = limits.y ? clamp(tmpEuler.y, limits.y[0], limits.y[1]) : tmpEuler.y;
        const nz = limits.z ? clamp(tmpEuler.z, limits.z[0], limits.z[1]) : tmpEuler.z;
        tmpEuler.set(nx, ny, nz, bone.rotation.order);
        tmpQuat3.setFromEuler(tmpEuler);
        bone.quaternion.copy(rest).multiply(tmpQuat3);
      }

      // Clamp relative to the *base pose* (not the current animation rest).
      // This prevents authored VRMA clips from accidentally introducing huge yaw/roll flips
      // that then become the new "rest" and cannot be corrected by stabilizePose().
      function clampRotationToBase(name, limits) {
        const bone = bones[name];
        const base = baseQuaternions[name];
        if (!bone || !base || !limits) return;
        const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
        tmpQuat2.copy(base).invert();
        tmpQuat3.copy(tmpQuat2).multiply(bone.quaternion);
        tmpEuler.setFromQuaternion(tmpQuat3, bone.rotation.order);
        const nx = limits.x ? clamp(tmpEuler.x, limits.x[0], limits.x[1]) : tmpEuler.x;
        const ny = limits.y ? clamp(tmpEuler.y, limits.y[0], limits.y[1]) : tmpEuler.y;
        const nz = limits.z ? clamp(tmpEuler.z, limits.z[0], limits.z[1]) : tmpEuler.z;
        tmpEuler.set(nx, ny, nz, bone.rotation.order);
        tmpQuat3.setFromEuler(tmpEuler);
        bone.quaternion.copy(base).multiply(tmpQuat3);
      }

      function stabilizeAnimationPose() {
        // Prevent full-body spins from any animation clip (idle or gestures).
        // Allow a wide but safe range so authored motion packs (sit/dance/lean)
        // can play naturally while still preventing 180°/360° flips.
        clampRotationToBase('hips', { x: [-1.15, 1.15], y: [-1.3, 1.3], z: [-0.7, 0.7] });
        clampRotationToBase('spine', { x: [-1.0, 1.0], y: [-1.0, 1.0], z: [-0.7, 0.7] });
        clampRotationToBase('chest', { x: [-1.0, 1.0], y: [-1.0, 1.0], z: [-0.7, 0.7] });
        clampRotationToBase('upperChest', { x: [-0.85, 0.85], y: [-0.85, 0.85], z: [-0.6, 0.6] });
      }

      function stabilizePose() {
        // Keep lower body upright and prevent extreme twists.
        clampRotation('head', { x: [-0.35, 0.35], y: [-0.45, 0.45], z: [-0.3, 0.3] });
        clampRotation('neck', { x: [-0.25, 0.25], y: [-0.35, 0.35], z: [-0.25, 0.25] });
        clampRotation('hips', { x: [-0.35, 0.35], y: [-0.35, 0.35], z: [-0.25, 0.25] });
        clampRotation('spine', { x: [-0.4, 0.4], y: [-0.35, 0.35], z: [-0.3, 0.3] });
        clampRotation('chest', { x: [-0.45, 0.45], y: [-0.35, 0.35], z: [-0.3, 0.3] });
        clampRotation('upperChest', { x: [-0.4, 0.4], y: [-0.3, 0.3], z: [-0.25, 0.25] });
        clampRotation('leftShoulder', { x: [-0.35, 0.35], y: [-0.35, 0.35], z: [-0.6, 0.6] });
        clampRotation('rightShoulder', { x: [-0.35, 0.35], y: [-0.35, 0.35], z: [-0.6, 0.6] });
        clampRotation('leftUpperArm', { x: [-1.2, 0.6], y: [-0.8, 0.8], z: [-1.4, 1.4] });
        clampRotation('rightUpperArm', { x: [-1.2, 0.6], y: [-0.8, 0.8], z: [-1.4, 1.4] });
        clampRotation('leftLowerArm', { x: [-0.3, 1.6], y: [-0.6, 0.6], z: [-1.2, 1.2] });
        clampRotation('rightLowerArm', { x: [-0.3, 1.6], y: [-0.6, 0.6], z: [-1.2, 1.2] });
        clampRotation('leftHand', { x: [-0.8, 0.8], y: [-0.8, 0.8], z: [-1.0, 1.0] });
        clampRotation('rightHand', { x: [-0.8, 0.8], y: [-0.8, 0.8], z: [-1.0, 1.0] });
        clampRotation('leftUpperLeg', { x: [-0.2, 0.6], y: [-0.3, 0.3], z: [-0.25, 0.25] });
        clampRotation('rightUpperLeg', { x: [-0.2, 0.6], y: [-0.3, 0.3], z: [-0.25, 0.25] });
        clampRotation('leftLowerLeg', { x: [-0.1, 0.7], y: [-0.25, 0.25], z: [-0.2, 0.2] });
        clampRotation('rightLowerLeg', { x: [-0.1, 0.7], y: [-0.25, 0.25], z: [-0.2, 0.2] });
        clampRotation('leftFoot', { x: [-0.4, 0.4], y: [-0.3, 0.3], z: [-0.3, 0.3] });
        clampRotation('rightFoot', { x: [-0.4, 0.4], y: [-0.3, 0.3], z: [-0.3, 0.3] });
        // Finger curl/splay safety net (prevents occasional spikes from animations/overlays).
        for (const finger of FINGER_BONES) {
          clampRotation(finger, { x: [-1.0, 1.0], y: [-0.9, 0.9], z: [-0.9, 0.9] });
        }
      }

      // Natural pose baseline (ported from Studying/ai_virtual_mate_web-main).
      // Helps avoid transient T-pose when VRMA idle fails to load.
      function applyNaturalPose() {
        const setEuler = (name, x, y, z) => {
          const b = bones[name];
          if (!b) return;
          b.rotation.set(x, y, z, b.rotation.order);
        };
        setEuler('leftUpperArm', 0, 0, -POSE_BASE.armZ);
        setEuler('leftLowerArm', 0, 0, 0);
        setEuler('leftHand', 0, 0, 0);
        setEuler('rightUpperArm', 0, 0, POSE_BASE.armZ);
        setEuler('rightLowerArm', 0, 0, 0);
        setEuler('rightHand', 0, 0, 0);
        setEuler('head', POSE_BASE.headX, 0, 0);
        setEuler('neck', POSE_BASE.headX * 0.4, 0, 0);
      }

      function applyRestPose() {
        // Keep model's native rest pose, only cache rotations.
        captureRestRotations();
      }

      function alignVrmUpright(vrm) {
        if (!vrm?.scene || !bones.hips) return;
        const head = bones.head || bones.neck || bones.spine;
        if (!head) return;
        vrm.scene.updateMatrixWorld(true);
        bones.hips.getWorldPosition(tmpVec);
        head.getWorldPosition(tmpVec2);
        tmpVec2.sub(tmpVec);
        if (tmpVec2.lengthSq() < 1e-6) return;
        tmpVec2.normalize();
        const dot = Math.min(1, Math.max(-1, tmpVec2.dot(worldUp)));
        const angle = Math.acos(dot);
        if (!Number.isFinite(angle) || angle < 0.35) {
          return;
        }
        tmpQuat.setFromUnitVectors(tmpVec2, worldUp);
        vrm.scene.quaternion.premultiply(tmpQuat);
        vrm.scene.updateMatrixWorld(true);
      }

      function alignVrmFacing(vrm) {
        const faceFront = vrm?.lookAt?.faceFront;
        if (!vrm?.scene || !faceFront) return;
        tmpVec.copy(faceFront);
        // Keep only yaw; pitch/roll should be handled by alignVrmUpright.
        tmpVec.y = 0;
        if (tmpVec.lengthSq() < 1e-6) return;
        tmpVec.normalize();
        tmpQuat.setFromUnitVectors(tmpVec, modelForward);
        vrm.scene.quaternion.premultiply(tmpQuat);
        vrm.scene.updateMatrixWorld(true);
      }

      function ensureFacingCamera(vrm) {
        if (!vrm?.scene) return;
        const head = bones.head || bones.neck || bones.spine;
        if (!head) return;
        vrm.scene.updateMatrixWorld(true);
        head.getWorldPosition(tmpEyePos);
        head.getWorldQuaternion(tmpQuat);
        // IMPORTANT:
        // - VRM0 uses faceFront = (0,0,-1)
        // - VRM1 defaults to faceFront = (0,0, 1)
        // So we must use VRM's faceFront as the head-local forward axis, otherwise
        // some models will be flipped 180° and appear "back-facing".
        const faceFront = vrm?.lookAt?.faceFront;
        const headLocalForward =
          faceFront && typeof faceFront.x === 'number'
            ? tmpVec.copy(faceFront)
            : tmpVec.set(0, 0, 1);
        const forward = headLocalForward.applyQuaternion(tmpQuat).normalize();
        const toCam = tmpVec2.copy(camera.position).sub(tmpEyePos).normalize();
        // Compare yaw only; pitch/roll should not decide the facing flip.
        forward.y = 0;
        toCam.y = 0;
        if (forward.lengthSq() > 1e-6) forward.normalize();
        if (toCam.lengthSq() > 1e-6) toCam.normalize();
        if (forward.dot(toCam) < 0) {
          vrm.scene.rotation.y += Math.PI;
          vrm.scene.updateMatrixWorld(true);
        }
      }

      function frameVrm(vrm) {
        if (!vrm?.scene) return;
        vrm.scene.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(vrm.scene);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        modelCenter.copy(center);
        const maxDim = Math.max(size.x, size.y, size.z);
        if (!Number.isFinite(maxDim) || maxDim <= 0) {
          return;
        }
        const fov = camera.fov * (Math.PI / 180);
        let distance = maxDim / (2 * Math.tan(fov / 2));
        distance = Math.max(distance * 1.6, 1.4);
        camera.position.set(
          center.x,
          center.y + size.y * 0.1,
          center.z - distance,
        );
        controls.target.copy(center);
        controls.minDistance = distance * 0.6;
        controls.maxDistance = distance * 2.2;
        controls.update();
        framing.ready = true;
        framing.baseDistance = distance;
        framing.center.copy(center);
        framing.size.copy(size);
        applyPetZoom(true);
      }

      function updateLookAtAnchor() {
        if (!bones.head) return;
        bones.head.getWorldPosition(tmpEyePos);
        // Prefer looking "in front" of the model to avoid 180° flips when the
        // camera is behind the avatar (which can cause sudden 360° twists).
        tmpVec.copy(camera.position).sub(modelCenter);
        const cursor = window.__cursorNdc;
        if (window.__cursorFollow === true && cursor && camera) {
          const nx = Math.min(1, Math.max(0, Number(cursor.x ?? 0.5)));
          const ny = Math.min(1, Math.max(0, Number(cursor.y ?? 0.5)));
          // Unproject cursor to a world direction, then place the look target
          // at a fixed distance in front of the camera.
          tmpVec.set(nx * 2 - 1, (1 - ny) * 2 - 1, 0.5);
          tmpVec.unproject(camera);
          tmpVec.sub(camera.position).normalize();
          lookAtBase.copy(camera.position).add(tmpVec.multiplyScalar(8));
          // Clamp vertical movement to avoid sudden up/down snaps.
          lookAtBase.y = THREE.MathUtils.clamp(
            lookAtBase.y,
            tmpEyePos.y - 0.8,
            tmpEyePos.y + 0.8,
          );
          // Apply temporary look override even when cursor follow is enabled.
          if (procedural.look.until > 0) {
            const now = clock.getElapsedTime();
            if (now < procedural.look.until) {
              lookAtBase.x += procedural.look.dx;
              lookAtBase.y += procedural.look.dy;
            } else {
              procedural.look.until = 0;
              procedural.look.dx = 0;
              procedural.look.dy = 0;
            }
          }
          return;
        }
        if (tmpVec.lengthSq() > 1e-6) {
          tmpVec.normalize();
        }
        if (currentVrm?.scene) {
          tmpVec2.set(0, 0, -1).applyQuaternion(currentVrm.scene.quaternion);
          if (tmpVec2.lengthSq() > 1e-6) {
            tmpVec2.normalize();
            if (tmpVec.dot(tmpVec2) < 0) {
              tmpVec.copy(tmpVec2);
            }
          }
        }
        lookAtBase.copy(modelCenter).add(tmpVec.multiplyScalar(8));
        lookAtBase.y = tmpEyePos.y;
        if (procedural.look.until > 0) {
          const now = clock.getElapsedTime();
          if (now < procedural.look.until) {
            lookAtBase.x += procedural.look.dx;
            lookAtBase.y += procedural.look.dy;
          } else {
            procedural.look.until = 0;
            procedural.look.dx = 0;
            procedural.look.dy = 0;
          }
        }
      }

      function motionToVrmaCandidates(motion) {
        const raw = String(motion ?? '').trim();
        if (!raw) return [];

        const key = raw.trim().toLowerCase();
        const byId = vrmaById.get(key);
        if (byId?.url) {
          return [byId.url];
        }
        const byName = vrmaByName.get(key);
        if (byName?.url) {
          return [byName.url];
        }

        // Allow selecting by numeric index shown in the app's Motion Debug panel.
        // Supports "12" / "012" / "#12" (1-based).
        const idxMatch = raw.match(/^#?(\d+)$/);
        if (idxMatch && Array.isArray(vrmaCatalog) && vrmaCatalog.length) {
          const idx = Number.parseInt(idxMatch[1], 10);
          if (Number.isFinite(idx) && idx >= 1 && idx <= vrmaCatalog.length) {
            const entry = vrmaCatalog[idx - 1];
            const url = typeof entry?.url === 'string' ? entry.url.trim() : '';
            if (url) return [url];
          }
        }

        if (/^https?:\/\//i.test(raw) || raw.startsWith('/')) {
          return raw.toLowerCase().endsWith('.vrma') ? [raw] : [];
        }

        // allow passing just "wave.vrma"
        if (raw.toLowerCase().endsWith('.vrma')) {
          return [`/assets/vrm_core/animations/${raw}`];
        }

        // "LookAtUser" -> "look_at_user.vrma"
        const snake = raw
          .replace(/([a-z])([A-Z])/g, '$1_$2')
          .replace(/[^a-zA-Z0-9_]+/g, '_')
          .toLowerCase();
        const clean = raw.replace(/[^a-zA-Z0-9]+/g, '_').toLowerCase();
        const candidates = [snake, clean]
          .filter((v, idx, arr) => v && arr.indexOf(v) === idx)
          .map((name) => `/assets/vrm_core/animations/${name}.vrma`);

        // convention: Idle -> idle_loop.vrma
        if (snake === 'idle' || clean === 'idle') {
          candidates.unshift(idleAnimationUrl);
        }
        return candidates;
      }

      function setVrmaCatalog(catalog) {
        vrmaCatalog = [];
        vrmaById = new Map();
        vrmaByName = new Map();

        const motions = catalog?.motions;
        if (Array.isArray(motions)) {
          motions.forEach((m) => {
            if (!m || typeof m !== 'object') return;
            const url = typeof m.url === 'string' ? m.url.trim() : '';
            if (!url || !url.toLowerCase().endsWith('.vrma')) return;
            const id = typeof m.id === 'string' ? m.id.trim() : '';
            const name = typeof m.name === 'string' ? m.name.trim() : '';
            const type = typeof m.type === 'string' ? m.type.trim() : '';
            const auto = typeof m.auto === 'object' && m.auto ? m.auto : {};
            const entry = { id, name, type, auto, url };
            vrmaCatalog.push(entry);
            if (id) vrmaById.set(id.toLowerCase(), entry);
            if (name) vrmaByName.set(name.toLowerCase(), entry);
          });
        }

        const uniq = new Set();
        // Prefer urls declared in catalog; fallback to whatever we already have.
        if (vrmaCatalog.length) {
          vrmaCatalog.forEach((m) => {
            if (m?.url) uniq.add(m.url);
          });
        } else if (Array.isArray(availableVrmaAnimations)) {
          availableVrmaAnimations.forEach((u) => {
            if (typeof u === 'string') uniq.add(u);
          });
        }
        // Ensure idle is always present as a fallback.
        if (!uniq.has(idleAnimationUrl)) {
          uniq.add(idleAnimationUrl);
        }
        availableVrmaAnimations = Array.from(uniq);

        const talkCount = vrmaCatalog.filter((m) => m?.auto?.talk === true).length;
        post('info', `vrma catalog: ${vrmaCatalog.length} (talk=${talkCount})`);
      }

      function stopActiveVrmaMotion() {
        const hadMotion = !!activeVrmaMotionAction || vrmaMotionPlaying === true;
        if (vrmaMotionRestoreTimer) {
          clearTimeout(vrmaMotionRestoreTimer);
          vrmaMotionRestoreTimer = null;
        }
        if (activeVrmaMotionAction) {
          try {
            // Fade out instead of an abrupt stop to avoid visible "twitch" when
            // returning to idle (especially noticeable on short gestures).
            activeVrmaMotionAction.fadeOut(0.18);
          } catch (_) {}
          // Don't stop() immediately; let fadeOut take effect.
          const actionToStop = activeVrmaMotionAction;
          setTimeout(() => {
            // If the same action got re-used, don't kill it.
            if (activeVrmaMotionAction === actionToStop) return;
            try {
              actionToStop.stop();
            } catch (_) {}
          }, 260);
          activeVrmaMotionAction = null;
        }
        vrmaMotionPlaying = false;
        if (idleAction) {
          try {
            const enabled = window.__idleAnimationEnabled === true;
            idleAction.enabled = enabled;
            if (enabled) {
              // Keep idle running continuously (no reset) to avoid snapping back
              // to the first keyframe every time a gesture ends.
              idleAction.play();
            }
          } catch (_) {}
        }
        if (hadMotion) {
          post('info', 'motion: Idle');
        }
      }

      // Keep idle as a base layer so partial clips don't snap unanimated bones to base pose.
      // We only reduce idle weight during one-shot gestures to let them read clearly.
      const IDLE_WEIGHT_WHILE_GESTURE = 0.35;
      const IDLE_WEIGHT_LERP_SPEED = 7.5;
      function updateIdleActionWeight(delta) {
        if (!idleAction) return;
        const enabled = window.__idleAnimationEnabled === true;
        const target =
          enabled ? (vrmaMotionPlaying ? IDLE_WEIGHT_WHILE_GESTURE : 1.0) : 0.0;
        try {
          const cur = typeof idleAction.getEffectiveWeight === 'function'
            ? idleAction.getEffectiveWeight()
            : Number(idleAction.weight ?? 1.0);
          const t = Math.min(1, Math.max(0, delta) * IDLE_WEIGHT_LERP_SPEED);
          const next = THREE.MathUtils.lerp(cur, target, t);
          idleAction.setEffectiveWeight(next);
          idleAction.enabled = next > 0.001;
          if (idleAction.enabled && typeof idleAction.isRunning === 'function' && !idleAction.isRunning()) {
            idleAction.play();
          }
        } catch (_) {}
      }

      function applyTalkOverlay(delta) {
        if (!currentVrm) return;
        const lerp = THREE.MathUtils.lerp;
        const rand = THREE.MathUtils.randFloat;
        const talking = window.__talking === true;

        const headMaxAngle = 0.08;
        const armMaxAngle = 0.12;
        const torsoMax = { x: 0.05, y: 0.06, z: 0.04 };

        if (talking) {
          talkOverlay.headTimer += delta;
          if (talkOverlay.headTimer >= talkOverlay.headInterval) {
            talkOverlay.headTimer = 0;
            talkOverlay.headInterval = rand(0.35, 0.7);
            talkOverlay.headTarget.x = rand(-headMaxAngle, headMaxAngle);
            talkOverlay.headTarget.y = rand(-headMaxAngle, headMaxAngle);
            talkOverlay.headTarget.z = rand(-headMaxAngle, headMaxAngle);
          }

          talkOverlay.armTimer += delta;
          if (talkOverlay.armTimer >= talkOverlay.armInterval) {
            talkOverlay.armTimer = 0;
            talkOverlay.armInterval = rand(0.45, 0.9);
            talkOverlay.armTarget.leftX = rand(-armMaxAngle, armMaxAngle);
            talkOverlay.armTarget.leftZ = rand(-armMaxAngle, armMaxAngle);
            talkOverlay.armTarget.rightX = rand(-armMaxAngle, armMaxAngle);
            talkOverlay.armTarget.rightZ = rand(-armMaxAngle, armMaxAngle);

            talkOverlay.torso.tx = rand(-torsoMax.x, torsoMax.x);
            talkOverlay.torso.ty = rand(-torsoMax.y, torsoMax.y);
            talkOverlay.torso.tz = rand(-torsoMax.z, torsoMax.z);

            const shoulderLift = rand(-0.06, 0.06);
            talkOverlay.shoulder.tlz = shoulderLift;
            talkOverlay.shoulder.trz = -shoulderLift;
          }
        } else {
          talkOverlay.headTarget.x = 0;
          talkOverlay.headTarget.y = 0;
          talkOverlay.headTarget.z = 0;
          talkOverlay.armTarget.leftX = 0;
          talkOverlay.armTarget.leftZ = 0;
          talkOverlay.armTarget.rightX = 0;
          talkOverlay.armTarget.rightZ = 0;
          talkOverlay.torso.tx = 0;
          talkOverlay.torso.ty = 0;
          talkOverlay.torso.tz = 0;
          talkOverlay.shoulder.tlz = 0;
          talkOverlay.shoulder.trz = 0;
        }

        const headLerp = talking ? 5.0 : 3.0;
        const armLerp = talking ? 5.0 : 3.0;
        const torsoLerp = talking ? 3.6 : 2.4;

        talkOverlay.head.x = lerp(talkOverlay.head.x, talkOverlay.headTarget.x, delta * headLerp);
        talkOverlay.head.y = lerp(talkOverlay.head.y, talkOverlay.headTarget.y, delta * headLerp);
        talkOverlay.head.z = lerp(talkOverlay.head.z, talkOverlay.headTarget.z, delta * headLerp);

        talkOverlay.arm.leftX = lerp(talkOverlay.arm.leftX, talkOverlay.armTarget.leftX, delta * armLerp);
        talkOverlay.arm.leftZ = lerp(talkOverlay.arm.leftZ, talkOverlay.armTarget.leftZ, delta * armLerp);
        talkOverlay.arm.rightX = lerp(talkOverlay.arm.rightX, talkOverlay.armTarget.rightX, delta * armLerp);
        talkOverlay.arm.rightZ = lerp(talkOverlay.arm.rightZ, talkOverlay.armTarget.rightZ, delta * armLerp);

        talkOverlay.torso.x = lerp(talkOverlay.torso.x, talkOverlay.torso.tx, delta * torsoLerp);
        talkOverlay.torso.y = lerp(talkOverlay.torso.y, talkOverlay.torso.ty, delta * torsoLerp);
        talkOverlay.torso.z = lerp(talkOverlay.torso.z, talkOverlay.torso.tz, delta * torsoLerp);

        talkOverlay.shoulder.lz = lerp(talkOverlay.shoulder.lz, talkOverlay.shoulder.tlz, delta * torsoLerp);
        talkOverlay.shoulder.rz = lerp(talkOverlay.shoulder.rz, talkOverlay.shoulder.trz, delta * torsoLerp);

        // Keep gaze stable: avoid fighting lookAt by not touching head/neck here.
        applyRestRotation('spine', {
          x: talkOverlay.torso.x * 0.35,
          y: talkOverlay.torso.y * 0.25,
          z: talkOverlay.torso.z * 0.25,
        });
        applyRestRotation('chest', {
          x: talkOverlay.torso.x * 0.25,
          y: talkOverlay.torso.y * 0.4,
          z: talkOverlay.torso.z * 0.3,
        });
        applyRestRotation('upperChest', {
          x: talkOverlay.torso.x * 0.18,
          y: talkOverlay.torso.y * 0.5,
          z: talkOverlay.torso.z * 0.24,
        });
        applyRestRotation('leftShoulder', { z: talkOverlay.shoulder.lz });
        applyRestRotation('rightShoulder', { z: talkOverlay.shoulder.rz });
        applyRestRotation('leftUpperArm', { x: talkOverlay.arm.leftX, z: talkOverlay.arm.leftZ });
        applyRestRotation('rightUpperArm', { x: talkOverlay.arm.rightX, z: talkOverlay.arm.rightZ });
      }

      function playRandomVrmaGesture(now) {
        if (!currentVrm) return;
        if (vrmaMotionPlaying) {
          // If the current clip is longer than the scheduling interval, avoid an
          // immediate back-to-back trigger right after it ends.
          autoDrive.nextGesture = Math.max(
            autoDrive.nextGesture,
            now + THREE.MathUtils.randFloat(0.35, 0.8),
          );
          return;
        }
        if (window.__talking !== true) return;
        if (!Array.isArray(availableVrmaAnimations) || !availableVrmaAnimations.length) return;

        // Only auto-play motions explicitly marked for "talk" to avoid
        // inappropriate actions (spin/squat/shoot) during normal conversation.
        const autoTalkUrls = vrmaCatalog
          .filter((m) => m?.auto?.talk === true)
          .map((m) => (typeof m.id === 'string' && m.id.trim() ? m.id : m.url))
          .filter((u) => typeof u === 'string' && u && u !== idleAnimationUrl)
          .filter((u) => isAutoMotionAllowed(u));

        if (!autoTalkUrls.length) {
          // No explicit talk motions: rely on the (safe) talk overlay instead of
          // picking arbitrary full-body clips from the library.
          autoDrive.nextGesture = now + THREE.MathUtils.randFloat(4.0, 8.0);
          return;
        }
        const candidates = autoTalkUrls;

        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        tryPlayVrmaMotion(pick).then((played) => {
          if (played) {
            post('info', `motion(vrma): ${pick}`);
            autoDrive.nextGesture = now + THREE.MathUtils.randFloat(6.0, 12.0);
          } else {
            autoDrive.nextGesture = now + THREE.MathUtils.randFloat(4.0, 8.0);
          }
        });
      }

      function playRandomVrmaIdleAction(now) {
        if (!currentVrm) return;
        if (vrmaMotionPlaying) {
          autoDrive.nextIdleAction = Math.max(
            autoDrive.nextIdleAction,
            now + THREE.MathUtils.randFloat(1.2, 2.4),
          );
          return;
        }
        if (window.__talking === true) return;
        if (!Array.isArray(availableVrmaAnimations) || !availableVrmaAnimations.length) return;

        // Idle variations should be explicitly whitelisted by the catalog.
        const autoIdle = vrmaCatalog
          .filter((m) => m?.auto?.idle === true && typeof m.url === 'string')
          .map((m) => (typeof m.id === 'string' && m.id.trim() ? m.id : m.url))
          .filter((u) => u && u !== idleAnimationUrl && u !== 'idle_loop')
          .filter((u) => isAutoMotionAllowed(u));

        const candidates = autoIdle;
        if (!candidates.length) {
          autoDrive.nextIdleAction = now + THREE.MathUtils.randFloat(30.0, 60.0);
          return;
        }

        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        tryPlayVrmaMotion(pick).then((played) => {
          if (played) {
            post('info', `motion(vrma): ${pick}`);
            autoDrive.nextIdleAction = now + THREE.MathUtils.randFloat(30.0, 300.0);
          } else {
            autoDrive.nextIdleAction = now + THREE.MathUtils.randFloat(30.0, 90.0);
          }
        });
      }

      async function tryPlayVrmaMotion(motion) {
        if (!currentVrm) return false;
        const urls = motionToVrmaCandidates(motion);
        if (!urls.length) return false;

        // Ensure mixer exists even if idle failed to load.
        if (!vrmMixer) {
          vrmMixer = new THREE.AnimationMixer(currentVrm.scene);
        }

        for (const url of urls) {
          let action = vrmaMotionActionCache.get(url);
          if (!action) {
            try {
              const anim = await loadVRMAnimation(url);
              const clip = await clipFromVRMAnimation(currentVrm, anim);
              if (!clip) {
                continue;
              }
              reAnchorRootPositionTrack(clip, currentVrm);
              lockPositionTrackY(clip);
              action = vrmMixer.clipAction(clip);
              action.setLoop(THREE.LoopOnce, 1);
              action.clampWhenFinished = true;
              vrmaMotionActionCache.set(url, action);
            } catch (_) {
              continue;
            }
          }

           try {
             // Stop previous one-shot if any.
             if (activeVrmaMotionAction && activeVrmaMotionAction !== action) {
              try {
                // Cross-fade out to avoid snapping when chaining gestures.
                activeVrmaMotionAction.fadeOut(0.12);
              } catch (_) {}
              const prev = activeVrmaMotionAction;
              setTimeout(() => {
                // If the action got re-used as the active one, don't kill it.
                if (activeVrmaMotionAction === prev) return;
                try {
                  prev.stop();
                } catch (_) {}
              }, 220);
             }
             activeVrmaMotionAction = action;
             vrmaMotionPlaying = true;

            // Keep idle running as a base layer to avoid transient T-poses when a
            // gesture clip doesn't key every bone (common in third-party packs).
            if (idleAction && window.__idleAnimationEnabled === true) {
              try {
                idleAction.enabled = true;
                idleAction.play();
              } catch (_) {}
            }

             action.enabled = true;
             action.reset();
             action.fadeIn(0.12);
             action.play();

            const duration = Number(action.getClip?.()?.duration ?? 0);
            const stopAfter =
              Number.isFinite(duration) && duration > 0.02
                ? (duration + 0.05)
                : 0.45;
            if (baseHipY == null) {
              const hipNode = currentVrm.humanoid?.getNormalizedBoneNode('hips');
              if (hipNode) {
                hipNode.getWorldPosition(tmpHipPos);
                baseHipY = tmpHipPos.y;
              }
            }
            hipLockUntil = Math.max(
              hipLockUntil,
              clock.getElapsedTime() + stopAfter + 0.2,
            );
            vrmaMotionRestoreTimer = setTimeout(() => {
              if (activeVrmaMotionAction === action) {
                stopActiveVrmaMotion();
              }
            }, stopAfter * 1000);
            return true;
          } catch (_) {
            // continue trying other candidates
          }
        }
        return false;
      }

      async function loadVrmFromUrl(url) {
        try {
          const gltf = await loader.loadAsync(url);
          post('info', `gltf loaded from ${url}`);
          if (currentVrm) {
            scene.remove(currentVrm.scene);
            currentVrm = null;
          }
          vrmMixer?.stopAllAction?.();
          vrmMixer = null;
          idleAction = null;
          activeVrmaMotionAction = null;
          vrmaMotionPlaying = false;
          if (vrmaMotionRestoreTimer) {
            clearTimeout(vrmaMotionRestoreTimer);
            vrmaMotionRestoreTimer = null;
          }
          vrmaMotionActionCache.clear();
          const vrm = gltf.userData.vrm;
          if (vrm) {
            try { VRMUtils.removeUnnecessaryVertices?.(gltf.scene); } catch (e) { console.warn('removeUnnecessaryVertices missing', e); }
            try { VRMUtils.combineSkeletons?.(gltf.scene); } catch (e) { console.warn('combineSkeletons missing', e); }
            try { VRMUtils.combineMorphs?.(vrm); } catch (e) { console.warn('combineMorphs missing', e); }
            try { VRMUtils.rotateVRM0?.(vrm); } catch (e) { console.warn('rotateVRM0 missing', e); }
            vrm.scene.traverse((obj) => {
              obj.frustumCulled = false;
            });
          }
          currentVrm = vrm;
          cacheBones();
          alignVrmUpright(currentVrm);
          alignVrmFacing(currentVrm);
          applyNaturalPose();
          currentVrm.humanoid?.update?.();
          currentVrm.springBoneManager?.reset?.();
          captureBasePose();
          applyRestPose();
          if (window.__stabilityMode === true) {
            applyStableIdle(0);
          }
          if (currentVrm?.lookAt) {
            const proxy = new VRMLookAtQuaternionProxy(currentVrm.lookAt);
            proxy.name = 'lookAtQuaternionProxy';
            currentVrm.scene.add(proxy);
            currentVrm.lookAt.target = lookAtTarget;
          }
          currentVrm.scene.position.set(0, 0, 0);
          currentVrm.scene.scale.set(1, 1, 1);
          scene.add(currentVrm.scene);
          optimizeTextures(currentVrm.scene);
          frameVrm(currentVrm);
          ensureFacingCamera(currentVrm);
          updateLookAtAnchor();
          blinkController = createBlinkController();
          eyeSaccadeController = createIdleEyeSaccades();
          emoteController = createEmoteController(currentVrm);
          // Lock hip height during the startup greeting to avoid vertical snapping.
          try {
            const hipNode = currentVrm.humanoid?.getNormalizedBoneNode('hips');
            if (hipNode) {
              hipNode.getWorldPosition(tmpHipPos);
              baseHipY = tmpHipPos.y;
              hipLockUntil = clock.getElapsedTime() + 2.0;
            }
          } catch (_) {
            baseHipY = null;
            hipLockUntil = 0;
          }

          // Load idle VRM animation
          try {
            vrmMixer = new THREE.AnimationMixer(currentVrm.scene);
            const anim = await loadVRMAnimation(idleAnimationUrl);
            const clip = await clipFromVRMAnimation(currentVrm, anim);
            if (clip) {
              reAnchorRootPositionTrack(clip, currentVrm);
              lockPositionTrackY(clip);
              idleAction = vrmMixer.clipAction(clip);
              if (window.__idleAnimationEnabled === true) {
                idleAction.play();
              }
              // Prime the idle action once so rest rotations can be captured.
              try {
                if (typeof vrmMixer.setTime === 'function') {
                  vrmMixer.setTime(0);
                } else {
                  vrmMixer.update(1 / 60);
                }
              } catch (_) {}
              captureRestRotations();
              post('info', 'idle vrma: loaded');
            }
          } catch (e) {
            console.warn('idle animation load failed', e);
          }
          setStatus('Lumi ready.');
          hideStatusSoon();
          post('info', 'VRM loaded');
          dumpCapabilities();
        } catch (err) {
          console.error('VRM load error', err);
          setStatus(`VRM load error: ${err}`);
          post('error', `VRM load error: ${err}`);
        }
      }

      async function loadVrmFromBase64(base64) {
        try {
          const binary = Uint8Array.from(atob(base64), (c) => c.charCodeAt(0));
          const blob = new Blob([binary], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          await loadVrmFromUrl(url);
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error('VRM load error', err);
          setStatus(`VRM load error: ${err}`);
        }
      }

      function setExpression(clip, intensity = 1.0) {
        if (!currentVrm?.expressionManager) return;
        if (emoteController && emoteController.setEmotionWithResetAfter(clip, 1000, intensity)) {
          // emotion controller will update on next tick
        } else {
          currentVrm.expressionManager.setValue(clip, intensity);
          currentVrm.expressionManager.update();
        }
        post('info', `expression: ${clip}=${intensity}`);
      }

      function setVisemeWeights(weights) {
        if (!currentVrm?.expressionManager) return;
        Object.entries(weights || {}).forEach(([clip, value]) => {
          currentVrm.expressionManager.setValue(clip, value);
        });
        currentVrm.expressionManager.update();
        post('info', `viseme: ${JSON.stringify(weights)}`);
      }

      function setMotion(motion) {
        if (!currentVrm) return;
        const m = String(motion ?? '').trim();
        if (!m) return;

        const key = m.toLowerCase();

        // Idle just restores the base animation state.
        if (key === 'idle' || key === 'idle_loop') {
          stopActiveVrmaMotion();
          motionMode = null;
          motionStart = clock.getElapsedTime();
          post('info', 'motion: Idle');
          return;
        }

        // Procedural actions (named explicitly so the app can decide when to trigger them).
        if (key === 'procedural_nod' || key === 'nod') {
          procedural.nod.active = true;
          procedural.nod.start = clock.getElapsedTime();
          motionMode = null;
          motionStart = clock.getElapsedTime();
          post('info', 'motion(procedural): nod');
          return;
        }
        if (key === 'procedural_look_left' || key === 'lookleft') {
          procedural.look.until = clock.getElapsedTime() + 1.6;
          procedural.look.dx = -0.9;
          procedural.look.dy = 0.0;
          motionMode = null;
          motionStart = clock.getElapsedTime();
          post('info', 'motion(procedural): lookLeft');
          return;
        }
        if (key === 'procedural_look_right' || key === 'lookright') {
          procedural.look.until = clock.getElapsedTime() + 1.6;
          procedural.look.dx = 0.9;
          procedural.look.dy = 0.0;
          motionMode = null;
          motionStart = clock.getElapsedTime();
          post('info', 'motion(procedural): lookRight');
          return;
        }
        if (key === 'procedural_look_at_user' || key === 'lookatuser') {
          procedural.look.until = 0;
          procedural.look.dx = 0;
          procedural.look.dy = 0;
          motionMode = null;
          motionStart = clock.getElapsedTime();
          post('info', 'motion(procedural): lookAtUser');
          return;
        }

        // Prefer authored VRMA motions (from reference projects / external assets).
        // Backward-compatible aliases for older configs.
        const alias =
          key === 'wave' ? 'gesture_greeting' :
          key === 'greeting' ? 'gesture_greeting' :
          key === 'peace' ? 'gesture_peace' :
          m;

        tryPlayVrmaMotion(alias).then((played) => {
          if (played) {
            motionMode = null;
            motionStart = clock.getElapsedTime();
            post('info', `motion(vrma): ${alias}`);
            return;
          }
          // No procedural fallback: avoid scary joint twists from hand-written motions.
          motionMode = null;
          motionStart = clock.getElapsedTime();
          post('info', `motion: unavailable (${alias})`);
        });
      }

      function setTalking(flag) {
        const next = !!flag;
        const prev = window.__talking === true;
        window.__talking = next;

        // Make sure even short utterances can trigger a gesture:
        // schedule the first talk gesture almost immediately on rising edge.
       if (next && !prev) {
          const now = clock.getElapsedTime();
         autoDrive.nextGesture = now + THREE.MathUtils.randFloat(0.08, 0.35);
         // Avoid idle variations firing right after speech starts.
         autoDrive.nextIdleAction = Math.max(autoDrive.nextIdleAction, now + 30.0);
          // Give short utterances a chance to still animate.
          playRandomVrmaGesture(now);
          return;
        }

        // After speech ends, allow idle variations sooner so the avatar stays alive.
        if (!next && prev) {
          const now = clock.getElapsedTime();
          autoDrive.nextIdleAction = Math.min(
            autoDrive.nextIdleAction,
            now + THREE.MathUtils.randFloat(30.0, 60.0),
          );
        }
      }

      window.loadVrmFromBase64 = loadVrmFromBase64;
      window.loadVrmFromUrl = loadVrmFromUrl;
      window.setExpression = setExpression;
      window.setVisemeWeights = setVisemeWeights;
      window.setMotion = setMotion;
      window.setTalking = setTalking;
      window.triggerPetDrag = triggerPetDrag;
      window.setVrmaCatalog = setVrmaCatalog;
      window.setAutoMotionWhitelist = setAutoMotionWhitelist;
      window.setAvailableVrmaAnimations = (list) => {
        if (Array.isArray(list)) {
          availableVrmaAnimations = list.filter((v) => typeof v === 'string');
        } else {
          availableVrmaAnimations = [];
        }
        // Ensure idle is always present as a fallback.
        if (!availableVrmaAnimations.includes(idleAnimationUrl)) {
          availableVrmaAnimations.unshift(idleAnimationUrl);
        }
        post('info', `vrma library: ${availableVrmaAnimations.length}`);
      };
      window.setControlMode = (mode) => {
        const raw = (mode ?? '').toString().trim().toLowerCase();
        const m = raw === 'advanced' ? 'advanced' : 'basic';
        window.__controlMode = m;
        setStatus(`Mode: ${m}`);
        post('info', `mode:${m}`);
      };

      // applyPose: expects { bones: { boneName: {x,y,z,w}}, expressions: {name: value}, visemes: {aa:0..1,...} }
      window.applyPose = (pose) => {
        if (window.__controlMode !== 'advanced') return;
        if (!pose) return;
        if (!currentVrm) return;
        // path 1: direct quaternion map (if provided)
        if (pose.bones) {
          Object.entries(pose.bones).forEach(([name, q]) => {
            const b = bones[name];
            if (!b || !q) return;
            const target = new THREE.Quaternion(
              Number(q.x ?? q._x ?? 0),
              Number(q.y ?? q._y ?? 0),
              Number(q.z ?? q._z ?? 0),
              Number(q.w ?? q._w ?? 1),
            ).normalize();
            b.quaternion.slerp(target, 0.35);
          });
        }
        // path 2: direction + pole targets (partial, adapted from Studying/airi)
        if (pose.targets) {
          applyPoseTargets(currentVrm, pose.targets, bones);
        }
        // path 3: mediapipe-like landmarks
        if (pose.worldLandmarks) {
          const targets = poseToVrmTargets(pose, pose.options || {});
          applyPoseTargets(currentVrm, targets, bones);
        }
        if (pose.expressions) {
          Object.entries(pose.expressions).forEach(([k, v]) => setExpression(k, Number(v ?? 0)));
        }
        if (pose.visemes) {
          setVisemeWeights(pose.visemes);
        }
      };

      function applyStableMotion(time) {
        if (!currentVrm || !motionMode) return;
        const t = time - motionStart;
        const phase = Math.min(t / motionDuration, 1);
        const ease = Math.sin(Math.PI * phase);
        switch (motionMode) {
          case 'Wave': {
            const wave = Math.sin(time * 6) * 0.18;
            applyRestRotation('rightUpperArm', {
              x: -0.35 * ease,
              y: -0.15 * ease,
              z: 0.25 * ease,
            });
            applyRestRotation('rightLowerArm', { z: 0.45 * ease + wave });
            applyRestRotation('rightHand', { z: wave * 0.6 });
            break;
          }
          case 'Nod': {
            const nod = Math.sin(time * 6) * 0.12;
            applyRestRotation('head', { x: POSE_BASE.headX + nod });
            applyRestRotation('neck', { x: (POSE_BASE.headX + nod) * 0.4 });
            break;
          }
          case 'LookLeft':
            applyRestRotation('head', { x: POSE_BASE.headX, y: 0.25 });
            applyRestRotation('neck', { x: POSE_BASE.headX * 0.4, y: 0.1 });
            break;
          case 'LookRight':
            applyRestRotation('head', { x: POSE_BASE.headX, y: -0.25 });
            applyRestRotation('neck', { x: POSE_BASE.headX * 0.4, y: -0.1 });
            break;
          case 'LookAtUser': {
            const nod = Math.sin(time * 3.6) * 0.06;
            applyRestRotation('head', { x: POSE_BASE.headX + nod });
            applyRestRotation('neck', { x: (POSE_BASE.headX + nod) * 0.4 });
            break;
          }
          default:
            break;
        }
        if (t > motionDuration) {
          motionMode = null;
          applyRestPose();
        }
        stabilizePose();
      }

      function applyMotion(time) {
        if (!currentVrm) return;
        const stabilityMode = window.__stabilityMode === true;
        if (stabilityMode) {
          applyStableMotion(time);
          return;
        }
        const t = time - motionStart;
        const head = bones.head;
        const lUpper = bones.leftUpperArm;
        const rUpper = bones.rightUpperArm;
        const lLower = bones.leftLowerArm;
        const rLower = bones.rightLowerArm;
        const rHand = bones.rightHand;

        // subtle idle sway when no motion
        const idleAmp = 0.04;
        const isAdvanced = window.__controlMode === 'advanced';
        if (!motionMode) {
          if (head) head.rotation.x = Math.sin(time * 0.7) * idleAmp;
          if (isAdvanced) return; // 高阶模式只保留微动
        }

        if (isAdvanced) return; // 高阶模式完全交由外部 applyPose 驱动

        switch (motionMode) {
          case 'Wave':
            // Raise arm to waving pose
            if (rUpper) {
              // Shoulder: lift forward + slight outward
              rUpper.rotation.set(
                -0.4 + Math.sin(time * 1.5) * 0.05,
                -0.3,
                1.0
              );
            }
            if (rLower) {
              // Elbow: bend and swing
              rLower.rotation.set(
                -0.1,
                0.0,
                1.0 + Math.sin(time * 5) * 0.45
              );
            }
            if (rHand) {
              rHand.rotation.set(0, 0, Math.sin(time * 6) * 0.25);
            }
            break;
          case 'Nod':
            if (head) head.rotation.x = Math.sin(time * 6) * 0.25;
            break;
          case 'LookLeft':
            if (head) head.rotation.y = 0.35;
            break;
          case 'LookRight':
            if (head) head.rotation.y = -0.35;
            break;
          default:
            break;
        }

        // auto reset after duration
        if (t > motionDuration) {
          motionMode = null;
          applyRestPose();
        }
      }

      function dumpCapabilities() {
        try {
          const boneKeys = Object.entries(bones)
            .filter(([, v]) => !!v)
            .map(([k]) => k);
          const expr = currentVrm?.expressionManager?.expressionMap
            ? Object.keys(currentVrm.expressionManager.expressionMap)
            : [];
          post('info', `bones:${JSON.stringify(boneKeys)}`);
          post('info', `expressions:${JSON.stringify(expr)}`);
        } catch (e) {
          console.warn('dumpCapabilities failed', e);
        }
      }

      // ---- VRM Animation (from airi) ----
      async function loadVRMAnimation(url) {
        const gltf = await loader.loadAsync(url);
        const userData = gltf.userData || {};
        const anims = userData.vrmAnimations || [];
        if (!anims.length) {
          console.warn('No VRM animations found in .vrma');
          return null;
        }
        return anims[0];
      }

      async function clipFromVRMAnimation(vrm, animation) {
        if (!vrm || !animation) return null;
        return createVRMAnimationClip(animation, vrm);
      }

      function reAnchorRootPositionTrack(clip, vrm) {
        const hipNode = vrm?.humanoid?.getNormalizedBoneNode('hips');
        if (!hipNode || !clip) return;
        hipNode.updateMatrixWorld(true);
        const defaultHipPos = new THREE.Vector3();
        hipNode.getWorldPosition(defaultHipPos);
        const hipsTrack = clip.tracks.find((track) =>
          track instanceof THREE.VectorKeyframeTrack &&
          track.name === `${hipNode.name}.position`
        );
        if (!(hipsTrack instanceof THREE.VectorKeyframeTrack)) return;
        const animeHipPos = new THREE.Vector3(
          hipsTrack.values[0],
          hipsTrack.values[1],
          hipsTrack.values[2],
        );
        const animeDelta = animeHipPos.clone().sub(defaultHipPos);
        clip.tracks.forEach((track) => {
          if (track.name.endsWith('.position') &&
              track instanceof THREE.VectorKeyframeTrack) {
            for (let i = 0; i < track.values.length; i += 3) {
              track.values[i] -= animeDelta.x;
              track.values[i + 1] -= animeDelta.y;
              track.values[i + 2] -= animeDelta.z;
            }
          }
        });
      }

      function lockPositionTrackY(clip) {
        if (!clip) return;
        clip.tracks.forEach((track) => {
          if (!(track instanceof THREE.VectorKeyframeTrack)) return;
          if (!track.name.endsWith('.position')) return;
          if (!track.values || track.values.length < 2) return;
          const firstY = track.values[1];
          for (let i = 1; i < track.values.length; i += 3) {
            track.values[i] = firstY;
          }
        });
      }

      // ---- Eye saccade (from airi) ----
      const EYE_SACCADE_INT_STEP = 400;
      const EYE_SACCADE_INTERVAL_SCALE = 4.0;
      const EYE_SACCADE_INT_P = [
        [0.075, 800],
        [0.110, 0],
        [0.125, 0],
        [0.140, 0],
        [0.125, 0],
        [0.050, 0],
        [0.040, 0],
        [0.030, 0],
        [0.020, 0],
        [1.000, 0],
      ];
      for (let i = 1; i < EYE_SACCADE_INT_P.length; i++) {
        EYE_SACCADE_INT_P[i][0] += EYE_SACCADE_INT_P[i - 1][0];
        EYE_SACCADE_INT_P[i][1] = EYE_SACCADE_INT_P[i - 1][1] + EYE_SACCADE_INT_STEP;
      }
      function randomSaccadeInterval() {
        const r = Math.random();
        for (let i = 0; i < EYE_SACCADE_INT_P.length; i++) {
          if (r <= EYE_SACCADE_INT_P[i][0]) {
            return (EYE_SACCADE_INT_P[i][1] + Math.random() * EYE_SACCADE_INT_STEP) *
              EYE_SACCADE_INTERVAL_SCALE;
          }
        }
        return (EYE_SACCADE_INT_P[EYE_SACCADE_INT_P.length - 1][1] +
          Math.random() * EYE_SACCADE_INT_STEP) * EYE_SACCADE_INTERVAL_SCALE;
      }

      function createBlinkController() {
        let isBlinking = false;
        let blinkProgress = 0;
        let timeSinceLastBlink = 0;
        const BLINK_DURATION = 0.2;
        const MIN_BLINK_INTERVAL = 1;
        const MAX_BLINK_INTERVAL = 6;
        let nextBlinkTime = Math.random() * (MAX_BLINK_INTERVAL - MIN_BLINK_INTERVAL) + MIN_BLINK_INTERVAL;
        function update(vrm, delta) {
          if (!vrm?.expressionManager) return;
          timeSinceLastBlink += delta;
          if (!isBlinking && timeSinceLastBlink >= nextBlinkTime) {
            isBlinking = true;
            blinkProgress = 0;
          }
          if (isBlinking) {
            blinkProgress += delta / BLINK_DURATION;
            const blinkValue = Math.sin(Math.PI * blinkProgress);
            vrm.expressionManager.setValue('blink', blinkValue);
            if (blinkProgress >= 1) {
              isBlinking = false;
              timeSinceLastBlink = 0;
              vrm.expressionManager.setValue('blink', 0);
              nextBlinkTime =
                Math.random() * (MAX_BLINK_INTERVAL - MIN_BLINK_INTERVAL) + MIN_BLINK_INTERVAL;
            }
          }
        }
        return { update };
      }

      function createIdleEyeSaccades() {
        let nextSaccadeAfter = -1;
        const fixationTarget = new THREE.Vector3();
        let timeSinceLastSaccade = 0;
        const gazeRange = 0.0;
        function updateFixationTarget(baseTarget) {
          fixationTarget.set(
            baseTarget.x + (Math.random() * (gazeRange * 2) - gazeRange),
            baseTarget.y + (Math.random() * (gazeRange * 2) - gazeRange),
            baseTarget.z,
          );
        }
        function update(vrm, baseTarget, delta) {
          if (!vrm?.lookAt) return;
          if (!vrm.lookAt.target) {
            vrm.lookAt.target = lookAtTarget;
          }
          if (timeSinceLastSaccade >= nextSaccadeAfter) {
            updateFixationTarget(baseTarget);
            timeSinceLastSaccade = 0;
            nextSaccadeAfter = randomSaccadeInterval() / 1000;
          } else if (!fixationTarget) {
            updateFixationTarget(baseTarget);
          }
          vrm.lookAt.target.position.lerp(fixationTarget, 0.12);
          timeSinceLastSaccade += delta;
        }
        function instantUpdate(vrm, target) {
          fixationTarget.set(target.x, target.y, target.z);
          if (!vrm?.lookAt) return;
          if (!vrm.lookAt.target) {
            vrm.lookAt.target = lookAtTarget;
          }
          vrm.lookAt.target.position.lerp(fixationTarget, 1);
          vrm.lookAt.update(0.016);
        }
        return { update, instantUpdate };
      }

      function createEmoteController(vrm) {
        const emotionStates = new Map([
          ['happy', { expression: [{ name: 'happy', value: 1.0 }, { name: 'aa', value: 0.3 }], blendDuration: 0.3 }],
          ['sad', { expression: [{ name: 'sad', value: 1.0 }, { name: 'oh', value: 0.2 }], blendDuration: 0.3 }],
          ['angry', { expression: [{ name: 'angry', value: 1.0 }, { name: 'ee', value: 0.4 }], blendDuration: 0.2 }],
          ['surprised', { expression: [{ name: 'surprised', value: 1.0 }, { name: 'oh', value: 0.6 }], blendDuration: 0.1 }],
          ['neutral', { expression: [{ name: 'neutral', value: 1.0 }], blendDuration: 0.5 }],
          ['relaxed', { expression: [{ name: 'relaxed', value: 1.0 }], blendDuration: 0.4 }],
        ]);
        let currentEmotion = null;
        let isTransitioning = false;
        let transitionProgress = 0;
        const currentValues = new Map();
        const targetValues = new Map();
        let resetTimeout = null;

        const lerp = (a, b, t) => a + (b - a) * t;
        const easeInOutCubic = (t) => (t < 0.5 ? 4 * t * t * t : 1 - (-2 * t + 2) ** 3 / 2);

        function clearReset() {
          if (resetTimeout) {
            clearTimeout(resetTimeout);
            resetTimeout = null;
          }
        }

        function setEmotion(emotionName, scale = 1.0) {
          clearReset();
          if (!emotionStates.has(emotionName)) {
            return false;
          }
          currentEmotion = emotionName;
          isTransitioning = true;
          transitionProgress = 0;
          if (vrm.expressionManager) {
            const names = Object.keys(vrm.expressionManager.expressionMap || {});
            for (const name of names) {
              vrm.expressionManager.setValue(name, 0);
            }
          }
          currentValues.clear();
          targetValues.clear();
          const state = emotionStates.get(emotionName);
          for (const expr of state.expression || []) {
            const currentValue = vrm.expressionManager?.getValue(expr.name) || 0;
            currentValues.set(expr.name, currentValue);
            targetValues.set(expr.name, (expr.value || 0) * scale);
          }
          return true;
        }

        function setEmotionWithResetAfter(emotionName, ms, scale = 1.0) {
          clearReset();
          const ok = setEmotion(emotionName, scale);
          if (!ok) return false;
          resetTimeout = setTimeout(() => {
            setEmotion('neutral', 1.0);
            resetTimeout = null;
          }, ms);
          return true;
        }

        function update(delta) {
          if (!isTransitioning || !currentEmotion) return;
          const state = emotionStates.get(currentEmotion) || { blendDuration: 0.3 };
          const blendDuration = state.blendDuration || 0.3;
          transitionProgress += delta / blendDuration;
          if (transitionProgress >= 1) {
            transitionProgress = 1;
            isTransitioning = false;
          }
          for (const [exprName, targetValue] of targetValues) {
            const startValue = currentValues.get(exprName) || 0;
            const currentValue = lerp(startValue, targetValue, easeInOutCubic(transitionProgress));
            vrm.expressionManager?.setValue(exprName, currentValue);
          }
        }

        return { setEmotion, setEmotionWithResetAfter, update };
      }

      function getOptionalPresence(landmark) {
        return landmark && typeof landmark === 'object' && 'presence' in landmark
          ? landmark.presence
          : undefined;
      }

      function getOptionalVisibility(landmark) {
        return landmark && typeof landmark === 'object' && 'visibility' in landmark
          ? landmark.visibility
          : undefined;
      }

      function isConfident(pose, index, thresholds) {
